services:
  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    mem_limit: 4g
    env_file: .env
    environment:
      POSTGRES_HOST: host.docker.internal
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    command:
      - gunicorn
      - config.wsgi:application
      - --bind=0.0.0.0:8000
      - --workers=4
      - --threads=1
      - --timeout=300
      - --access-logfile=-
      - --error-logfile=-
    ports:
      - "8000:8000"
    volumes:
      - ./core/bucket/bucketLocal/files:/app/core/bucket/bucketLocal/files
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build: .
    env_file: .env
    environment:
      POSTGRES_HOST: host.docker.internal
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    command:
      - celery
      - -A
      - config
      - worker
      - --loglevel=INFO
      - --concurrency=2
      - --max-tasks-per-child=100
    volumes:
      - ./core/bucket/bucketLocal/files:/app/core/bucket/bucketLocal/files
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
